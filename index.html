<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>最終戦力計算</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: linear-gradient(180deg, #fff0fb, #f4e8ff);
  text-align: center;
}

#lock {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.lock-box {
  background: white;
  padding: 30px;
  border-radius: 20px;
}

#display {
  font-size: 28px;
  margin: 10px;
}

.keypad {
  display: grid;
  grid-template-columns: repeat(3, 70px);
  gap: 10px;
}

.keypad button {
  padding: 15px;
  font-size: 18px;
}

.box {
  max-width: 400px;
  margin: 30px auto;
  padding: 20px;
  background: white;
  border-radius: 20px;
}

input {
  width: 90%;
  padding: 12px;
  font-size: 20px;
}

.bubble {
  border: 3px solid #d77cff;
  border-radius: 20px;
  padding: 15px;
}

.rank-s { background: #fff7d6; }
.rank-a { background: #fff0f6; }
.rank-b { background: #f7efff; }
.rank-c { background: #eef8ff; }
.rank-d { background: #f1f1f1; }
</style>
</head>

<body>

<div id="lock">
  <div class="lock-box">
    <h2>育成チェッカー🔐</h2>
    <div id="display">・・・・</div>

    <div class="keypad">
      <button onclick="press(1)">1</button>
      <button onclick="press(2)">2</button>
      <button onclick="press(3)">3</button>
      <button onclick="press(4)">4</button>
      <button onclick="press(5)">5</button>
      <button onclick="press(6)">6</button>
      <button onclick="press(7)">7</button>
      <button onclick="press(8)">8</button>
      <button onclick="press(9)">9</button>
      <button onclick="clearPass()">C</button>
      <button onclick="press(0)">0</button>
      <button onclick="unlock()">OK</button>
    </div>

    <p id="error"></p>
  </div>
</div>

<div id="main" style="display:none;">
  <div class="box">
    <h1>最終戦力計算</h1>

    <h2 id="question">HPを入力してね</h2>
    <input type="number" id="input">
    <p id="hint"></p>
    <p id="inputError" style="color:red;"></p>

    <button onclick="next()">次へ</button>
  </div>
</div>

<script>
let inputPass = "";

function press(num){
  if(inputPass.length>=4) return;
  inputPass+=num;
  document.getElementById("display").textContent=inputPass.padEnd(4,"・");
}

function clearPass(){
  inputPass="";
  document.getElementById("display").textContent="・・・・";
}

function unlock(){
  if(inputPass==="5423"){
    document.getElementById("lock").style.display="none";
    document.getElementById("main").style.display="block";
  }else{
    document.getElementById("error").textContent="ちがうよ";
    clearPass();
  }
}

let step=0;
let data={};

const questions=[
  {key:"hp",text:"HPを入力してね",hint:"HPの数字だけ入れてね"},
  {key:"main",text:"合ってる型の攻撃力を入力してね！",hint:"知能型なら知能、パワー型ならパワー"},
  {key:"sub",text:"合ってない型の攻撃力を入力してね",hint:"パワー型なら知能の攻撃力だよ"},
  {key:"up",text:"大UP回数を入力してね",hint:"全部まとめた回数"},
  {key:"speed",text:"速度を入力してね",hint:"速度10なら0、12なら1"}
];

function next(){
  let value=document.getElementById("input").value;
  if(value===""){
    document.getElementById("inputError").textContent="数字入れて";
    return;
  }

  data[questions[step].key]=Number(value);
  step++;

  document.getElementById("input").value="";
  document.getElementById("inputError").textContent="";

  if(step<questions.length){
    document.getElementById("question").textContent=questions[step].text;
    document.getElementById("hint").textContent=questions[step].hint;
  }else{
    calc();
  }
}

function calc(){
  const total=
    data.hp*2+
    data.main*40+
    data.sub*6+
    data.up*500+
    data.speed*400+
    6000+
    24920+
    75000;

  let comment="";
  let rankClass="";

  if(total>=210000){
    comment="21万…！？脅威！！！";
    rankClass="rank-s";
  }else if(total>=205000){
    comment="はーい惜しかったねえ〜！";
    rankClass="rank-a";
  }else if(total>=200000){
    comment="まぁ、出るよね！";
    rankClass="rank-a";
  }else if(total>=190000){
    comment="まぁその程度だよね";
    rankClass="rank-b";
  }else if(total>=180000){
    comment="え？そいつ育てるの？";
    rankClass="rank-c";
  }else{
    comment="・・・";
    rankClass="rank-d";
  }

  document.body.innerHTML=`
    <div class="box">
      <h1>結果</h1>
      <div class="bubble ${rankClass}">
        最終戦力は…<br>
        <strong>${total.toLocaleString()}！</strong><br><br>
        ${comment}
      </div>
      <button onclick="location.reload()">もう一回</button>
    </div>
  `;
}
</script>

</body>
</html>
